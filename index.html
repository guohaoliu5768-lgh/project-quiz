<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>项目投资监管学习测验</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #18202f;
      --muted: #697386;
      --line: #d9e0ea;
      --navy: #183153;
      --teal: #0f766e;
      --amber: #b45309;
      --red: #b42318;
      --green: #137333;
      --blue: #2563eb;
      --shadow: 0 14px 34px rgba(24, 49, 83, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(24,49,83,.08), rgba(15,118,110,.04) 340px, transparent 680px),
        var(--bg);
    }

    button, input { font: inherit; }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.35fr .65fr;
      gap: 24px;
      align-items: stretch;
      margin-bottom: 18px;
    }

    .hero-main {
      padding: 34px;
      background: var(--navy);
      color: white;
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-height: 230px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .kicker {
      margin: 0 0 12px;
      color: rgba(255,255,255,.72);
      font-size: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1.16;
      letter-spacing: 0;
    }

    .hero-main p {
      max-width: 720px;
      margin: 18px 0 0;
      color: rgba(255,255,255,.82);
      line-height: 1.75;
    }

    .hero-side {
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      padding: 24px;
      display: grid;
      gap: 14px;
      align-content: center;
    }

    .metric {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .metric:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .metric strong {
      color: var(--navy);
      font-size: 28px;
    }

    .metric span {
      color: var(--muted);
      text-align: right;
      line-height: 1.5;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .setup {
      padding: 28px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 19px;
      color: var(--navy);
    }

    .choice-row {
      display: grid;
      gap: 10px;
    }

    .difficulty {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      background: #fff;
      cursor: pointer;
      transition: border-color .18s, box-shadow .18s, transform .18s;
    }

    .difficulty:hover,
    .difficulty.active {
      border-color: var(--teal);
      box-shadow: 0 8px 18px rgba(15,118,110,.12);
      transform: translateY(-1px);
    }

    .difficulty strong {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
    }

    .difficulty span {
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .source-list {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.9;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .btn {
      border: 0;
      border-radius: 7px;
      padding: 12px 18px;
      cursor: pointer;
      background: var(--navy);
      color: white;
      min-height: 44px;
    }

    .btn.secondary {
      color: var(--navy);
      background: #e8eef7;
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: .55;
    }

    .quiz {
      display: none;
      padding: 26px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
    }

    .progress-track {
      height: 10px;
      background: #e7edf5;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--teal), var(--blue));
      transition: width .25s;
    }

    .status {
      color: var(--muted);
      white-space: nowrap;
      font-size: 14px;
    }

    .question-head {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eef4ff;
      color: var(--blue);
      font-size: 13px;
    }

    .tag.difficulty-tag { background: #e8f5f3; color: var(--teal); }

    .question {
      margin: 0 0 20px;
      font-size: 23px;
      line-height: 1.55;
      color: var(--navy);
    }

    .options {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    .option {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px 16px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      line-height: 1.55;
      transition: border-color .18s, background .18s;
    }

    .option:hover,
    .option.selected {
      border-color: var(--blue);
      background: #f2f6ff;
    }

    .option.correct {
      border-color: var(--green);
      background: #ecf7ee;
    }

    .option.wrong {
      border-color: var(--red);
      background: #fff1f0;
    }

    .feedback {
      display: none;
      margin: 16px 0 8px;
      padding: 18px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fbfcff;
      line-height: 1.75;
    }

    .feedback strong {
      color: var(--navy);
    }

    .report {
      display: none;
      padding: 28px;
    }

    .report-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin: 18px 0;
    }

    .report-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      background: #fff;
    }

    .report-card span {
      display: block;
      color: var(--muted);
      margin-bottom: 8px;
      font-size: 13px;
    }

    .report-card strong {
      color: var(--navy);
      font-size: 28px;
    }

    .analysis-block {
      border-top: 1px solid var(--line);
      padding-top: 18px;
      margin-top: 18px;
    }

    .bars {
      display: grid;
      gap: 12px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 110px 1fr 74px;
      gap: 12px;
      align-items: center;
      color: var(--muted);
    }

    .bar {
      height: 12px;
      background: #e8edf4;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      width: 0;
      background: var(--teal);
    }

    .review-list {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .review-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fff;
      line-height: 1.65;
    }

    .review-item strong {
      color: var(--navy);
    }

    .hidden { display: none !important; }

    @media (max-width: 820px) {
      .shell { width: min(100% - 22px, 1120px); padding-top: 14px; }
      .hero, .setup { grid-template-columns: 1fr; }
      .hero-main { padding: 24px; min-height: 220px; }
      .report-grid { grid-template-columns: repeat(2, 1fr); }
      .topbar { grid-template-columns: 1fr; }
      .status { white-space: normal; }
      .question { font-size: 20px; }
      .bar-row { grid-template-columns: 86px 1fr 58px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-main">
        <div>
          <p class="kicker">基于本文件夹材料生成</p>
          <h1>项目投资监管学习测验</h1>
          <p>覆盖项目立项、审批权限、招投标、合同鉴证、验收稽核、后评估和 2026 年度授权额度。每题确认后立即显示正确答案和解析，完成后生成测验情况分析报告。</p>
        </div>
      </div>
      <aside class="hero-side">
        <div class="metric"><strong>30</strong><span>每次测验题数</span></div>
        <div class="metric"><strong>3</strong><span>普通 / 中等 / 困难</span></div>
        <div class="metric"><strong>90</strong><span>内置题库题目</span></div>
      </aside>
    </section>

    <section id="setup" class="panel setup">
      <div>
        <h2 class="section-title">选择测验难度</h2>
        <div class="choice-row" id="difficultyChoices">
          <button class="difficulty active" data-level="普通">
            <strong>普通</strong>
            <span>适合快速熟悉制度框架和基础概念，题目多为直接条款识记。</span>
          </button>
          <button class="difficulty" data-level="中等">
            <strong>中等</strong>
            <span>适合检验流程、条件和数值边界，包含较多应用判断。</span>
          </button>
          <button class="difficulty" data-level="困难">
            <strong>困难</strong>
            <span>适合考核综合判断、审批边界、超额计算和风险识别。</span>
          </button>
        </div>
        <div class="actions">
          <button id="startBtn" class="btn">开始测验</button>
          <button id="shuffleBtn" class="btn secondary">换一组题</button>
        </div>
      </div>
      <div>
        <h2 class="section-title">题目来源</h2>
        <ul class="source-list">
          <li>《投资监管规定2021（定稿）》</li>
          <li>《投资监管规定（下发企业）》培训材料</li>
          <li>《关于授权工业和影视文旅板块2026年度审批额度的请示》及审核意见</li>
        </ul>
      </div>
    </section>

    <section id="quiz" class="panel quiz">
      <div class="topbar">
        <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
        <div id="status" class="status"></div>
      </div>
      <div class="question-head">
        <span id="qCategory" class="tag"></span>
        <span id="qLevel" class="tag difficulty-tag"></span>
      </div>
      <h2 id="questionText" class="question"></h2>
      <div id="options" class="options"></div>
      <div id="feedback" class="feedback"></div>
      <div class="actions">
        <button id="confirmBtn" class="btn" disabled>确认本题</button>
        <button id="nextBtn" class="btn secondary hidden">下一题</button>
        <button id="finishBtn" class="btn secondary hidden">查看报告</button>
      </div>
    </section>

    <section id="report" class="panel report">
      <h2 class="section-title">测验情况分析报告</h2>
      <div id="reportSummary" class="report-grid"></div>
      <div class="analysis-block">
        <h3 class="section-title">知识模块掌握情况</h3>
        <div id="categoryBars" class="bars"></div>
      </div>
      <div class="analysis-block">
        <h3 class="section-title">分析建议</h3>
        <p id="advice"></p>
      </div>
      <div class="analysis-block">
        <h3 class="section-title">错题回顾</h3>
        <div id="reviewList" class="review-list"></div>
      </div>
      <div class="actions">
        <button id="restartBtn" class="btn">重新测验</button>
        <button id="newSetBtn" class="btn secondary">同难度再来一组</button>
      </div>
    </section>
  </main>

  <script>
    const QUESTION_COUNT = 30;
    const bank = [
      {d:"普通",c:"审批权限",q:"大型工业企业负责人被授权的单项审批额度是多少？",o:["50万元（含）以下","100万元（含）以下","150万元（含）以下","300万元（含）以下"],a:2,e:"制度列明大型工业企业单项审批权限为150万元（含）以下，年度累计1500万元。"},
      {d:"普通",c:"审批权限",q:"事业单位负责人被授权的单项审批额度是多少？",o:["5万元（含）以下","10万元（含）以下","20万元（含）以下","50万元（含）以下"],a:0,e:"事业单位负责人单项5万元（含）以下，年度累计50万元。"},
      {d:"普通",c:"审批权限",q:"行业主管副总裁的单项审批权限为多少？",o:["200万元（含）以下","300万元（含）以下","400万元（含）以下","500万元（含）以下"],a:2,e:"行业主管副总裁单项400万元（含）以下，年度累计为主管各下属公司董事长权限年度累计总额的3倍。"},
      {d:"普通",c:"立项资料",q:"无工程设计类投资项目上报资料至少应包含什么？",o:["可行性报告、企业内部论证文件等资料","竣工图和验收报告","隐蔽工程签证资料","中标通知书和合同鉴证表"],a:0,e:"无工程设计类项目上报资料要求为可行性报告、企业内部论证文件等其他相关资料。"},
      {d:"普通",c:"立项资料",q:"可行性报告中的指标及描述将作为什么依据？",o:["项目评估验收依据","投标保证金缴纳依据","合同鉴证编号依据","供应商注册依据"],a:0,e:"培训材料和制度均强调，可研报告中的指标及描述将作为项目评估验收的依据。"},
      {d:"普通",c:"立项流程",q:"涉及工程设计的投资项目，应先申请什么？",o:["项目工程设计立项","合同付款申请","竣工验收申请","后评估豁免申请"],a:0,e:"制度要求涉及工程设计的投资项目先申请项目工程设计立项，施工图设计评审完成后再申请投资立项。"},
      {d:"普通",c:"实施监督",q:"项目实施必须明确哪些项目小组成员？",o:["项目、基建、技术、设备、财务负责人","采购、仓库、销售、行政负责人","法务、审计、人事、品牌负责人","董事、监事、外部顾问"],a:0,e:"制度要求明确项目负责人、基建负责人、技术负责人、设备负责人和财务负责人等成员。"},
      {d:"普通",c:"实施监督",q:"项目实际投资将超出规定控制线时，应当怎么做？",o:["说明原因并及时写出调整概算报告，按程序增补立项","直接继续实施，竣工后说明","只需财务负责人签字","拆分成多个小项目备案"],a:0,e:"如实际投资金额将超出规定，必须说明原因，并及时写出调整概算报告，按项目报批程序增补立项。"},
      {d:"普通",c:"立项流程",q:"总部批文批复日期起算，一般项目一年内未动工会怎样？",o:["批文自动失效","自动延期一年","转为备案项目","无需再管理"],a:0,e:"制度规定总部批文批复日期起算，一年内未动工的项目批文自动失效，仍需实施则重新报批。"},
      {d:"普通",c:"招标监管",q:"集团设备采购、设备安装工程、工艺设计及信息化管理等项目属于什么监管范围？",o:["招投标范围","薪酬考核范围","资产处置范围","档案借阅范围"],a:0,e:"制度第十一条将这些事项纳入招标范围。"},
      {d:"普通",c:"招标方式",q:"招标方式分为哪两种？",o:["公开招标、邀请招标","公开招标、随机抽签","议标、直接采购","比价、询价"],a:0,e:"制度规定招标分为公开招标、邀请招标两种方式；议标或定向议标需符合特殊情形并按程序批准。"},
      {d:"普通",c:"招标方式",q:"公开招标的有效投标人不得少于多少个？",o:["2个","3个","4个","5个"],a:1,e:"公开招标参与的有效投标人不得少于三个。"},
      {d:"普通",c:"招标方式",q:"邀请招标的有效投标人一般不得少于多少个？",o:["1个","2个","3个","5个"],a:2,e:"邀请招标参与的有效投标人一般不得少于三个。"},
      {d:"普通",c:"招标文件",q:"投标文件通常要求分开封装哪三类标书？",o:["资信标、技术标、商务标","价格标、发票标、合同标","资格标、付款标、验收标","设计标、施工标、维护标"],a:0,e:"招标文件要求潜在投标人提供分开封装的资信标、技术标、商务标。"},
      {d:"普通",c:"投标管理",q:"投标保证金一般不高于预算标的的多少，且不超过多少万元？",o:["1%，50万元","2%，80万元","3%，100万元","5%，200万元"],a:1,e:"制度规定投标保证金一般不高于预算标的的2%，且不超过80万元人民币。"},
      {d:"普通",c:"投标管理",q:"列入横店集团投标人不良行为记录名单的，几年内不得参加相关招投标？",o:["1年","2年","3年","5年"],a:2,e:"列入不良行为记录名单的，三年内不得参加横店集团设备采购与设备安装工程招投标。"},
      {d:"普通",c:"开评标",q:"开标评标程序中，开启资信标后主要明确什么？",o:["合格投标人的资格条件","合同付款比例","项目后评估时间","设备折旧年限"],a:0,e:"程序为开启资信标，明确合格投标人的资格条件，再开技术标、商务标。"},
      {d:"普通",c:"开评标",q:"最低价中标的评标结果如何处理？",o:["报集团项目投资监管信息系统备案","必须董事长审批","必须重新招标","无需留痕"],a:0,e:"最低价中标的，结果报集团项目投资监管信息系统备案。"},
      {d:"普通",c:"合同管理",q:"总部投资与环保监管部门参与招标的合同，付款前必须经过什么？",o:["总部投资与环保监管部门鉴证","供应商自行确认","投标人二次报价","项目组口头同意"],a:0,e:"总部参与招标的，合同必须经总部投资与环保监管部门鉴证，资料上传确认后财务部门方可支付合同进度款。"},
      {d:"普通",c:"合同管理",q:"安装合同原则上采用什么合同？",o:["闭口或半闭口合同","完全开口合同","口头合同","无附件合同"],a:0,e:"签订的安装合同需明确承包方式、结算方式等，原则上采用闭口或半闭口合同。"},

      {d:"困难",c:"质量验收",q:"发现不合格或与协议约定不符的设备和材料，应如何处理？",o:["拒绝接收","先接收再说","直接付款","作为合格品入库"],a:0,e:"设备、材料到货需验证，发现不合格或与协议约定不符的应拒绝接收。"},
      {d:"困难",c:"稽核结算",q:"工程变更前，应先进行什么并由业主单位同意？",o:["设计图纸变更","合同销毁","供应商注销","后评估打分"],a:0,e:"工程变更前先进行设计图纸变更，由业主单位同意，并向施工方及时出具联系单。"},
      {d:"困难",c:"稽核结算",q:"未按变更流程进行变更的工程量，在结算时如何处理？",o:["不予结算","按两倍结算","自动转入余款","由施工单位自行定价"],a:0,e:"制度第三十一条明确未按变更流程进行变更的工程量不予结算。"},
      {d:"困难",c:"稽核结算",q:"变更预算工程量超过各单位规定招标额度时，对该部分工程量应如何处理？",o:["重新议价","直接按原价支付","不记录资料","自动免审"],a:0,e:"当变更预算工程量超过各单位规定招标额度时，对此部分工程量需进行重新议价。"},
      {d:"困难",c:"稽核结算",q:"安装工程结算书必须附的资料中，不包括哪一项？",o:["安装承包合同正本、施工图、竣工图等","设计变更联系单、工程量计算书","竣工验收报告、隐蔽工程签证资料","供应商节日祝福函"],a:3,e:"结算书必须附合同正本、施工图、竣工图、设计变更联系单、工程量计算书、竣工验收报告、隐蔽工程签证资料等。"},
      {d:"困难",c:"竣工验收",q:"项目各子项未验收或验收未通过时，能否支付余款？",o:["不得支付余款","可以全额支付","只要供应商同意即可支付","只需项目经理同意即可"],a:0,e:"各子项未进行验收或验收未通过的，不得支付余款。违规支付将追究项目负责人和财务负责人责任。"},
      {d:"困难",c:"后评估",q:"评估结果与可行性报告目标出入较大时，应如何处理？",o:["查找剖析原因，重大投资失误追究单位负责人和项目负责人责任","直接删除可研报告","只调整供应商评分","无需处理"],a:0,e:"制度第三十五条规定需查找剖析原因，对重大投资失误追究单位负责人和项目负责人责任。"},
      {d:"困难",c:"信息系统",q:"投资监管信息系统中项目管理内容不包括哪一项？",o:["项目立项和备案","招投标、实施进度、投资额","项目检查反馈、竣工、验收、整改、延期和终止","员工私人消费记录"],a:3,e:"系统填报内容包括立项备案、招投标、实施进度、投资额、检查反馈、竣工验收、整改、延期和终止等。"},
      {d:"困难",c:"附则责任",q:"项目立项、实施、合同签订、结算和验收中存在失职、弄虚作假等情形，由哪个部门视情节处理？",o:["总部法纪部门","供应商售后部门","广告宣传部门","外部媒体"],a:0,e:"第四十一条规定由总部法纪部门视情节轻重作出处理。"},
      {d:"困难",c:"2026授权",q:"2026授权审核意见中，单项审批额度与上一年度相比如何？",o:["与2025年持平","全部上调","全部下调","取消单项额度"],a:0,e:"审核意见指出单项审批额度与2025年持平。"},
      {d:"困难",c:"2026授权",q:"2026授权意见中特别提示影视文旅板块应重点抓好哪类项目？",o:["由我方实际操作的主控主投电影和网剧项目","所有参投融资性质且固定回报项目","只做办公楼改造项目","所有未上映影片"],a:0,e:"意见建议重点抓好由我方实际操作的主控主投电影和网剧项目，并关注控制参投融资性质我方获取固定回报的项目。"},
      {d:"困难",c:"2026授权",q:"影视文旅板块旅游及场景类投资、影城改造、办公楼改造等固定资产投资审批权限按什么执行？",o:["《管理手册》授权审批权限","电影项目授权额度","网剧项目授权额度","投标保证金条款"],a:0,e:"授权意见备注指出这些固定资产投资按《管理手册》授权的审批权限执行。"}
    ];

    const state = {
      level: "普通",
      questions: [],
      index: 0,
      selected: null,
      answered: false,
      answers: []
    };

    const setup = document.getElementById("setup");
    const quiz = document.getElementById("quiz");
    const report = document.getElementById("report");
    const progressFill = document.getElementById("progressFill");
    const statusEl = document.getElementById("status");
    const qCategory = document.getElementById("qCategory");
    const qLevel = document.getElementById("qLevel");
    const questionText = document.getElementById("questionText");
    const optionsEl = document.getElementById("options");
    const feedback = document.getElementById("feedback");
    const confirmBtn = document.getElementById("confirmBtn");
    const nextBtn = document.getElementById("nextBtn");
    const finishBtn = document.getElementById("finishBtn");

    function shuffle(items) {
      const arr = [...items];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function makeSet() {
      const pool = bank.filter(item => item.d === state.level);
      state.questions = shuffle(pool).slice(0, QUESTION_COUNT);
      state.index = 0;
      state.selected = null;
      state.answered = false;
      state.answers = [];
    }

    function startQuiz() {
      makeSet();
      setup.style.display = "none";
      report.style.display = "none";
      quiz.style.display = "block";
      renderQuestion();
    }

    function renderQuestion() {
      const item = state.questions[state.index];
      state.selected = null;
      state.answered = false;
      qCategory.textContent = item.c;
      qLevel.textContent = state.level;
      questionText.textContent = item.q;
      statusEl.textContent = `第 ${state.index + 1} / ${QUESTION_COUNT} 题`;
      progressFill.style.width = `${(state.index / QUESTION_COUNT) * 100}%`;
      feedback.style.display = "none";
      feedback.innerHTML = "";
      confirmBtn.disabled = true;
      confirmBtn.classList.remove("hidden");
      nextBtn.classList.add("hidden");
      finishBtn.classList.add("hidden");
      optionsEl.innerHTML = "";
      item.o.forEach((text, idx) => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.type = "button";
        btn.textContent = `${String.fromCharCode(65 + idx)}. ${text}`;
        btn.addEventListener("click", () => selectOption(idx));
        optionsEl.appendChild(btn);
      });
    }

    function selectOption(idx) {
      if (state.answered) return;
      state.selected = idx;
      [...optionsEl.children].forEach((btn, i) => btn.classList.toggle("selected", i === idx));
      confirmBtn.disabled = false;
    }

    function confirmAnswer() {
      if (state.selected === null || state.answered) return;
      const item = state.questions[state.index];
      const correct = state.selected === item.a;
      state.answered = true;
      state.answers.push({ item, selected: state.selected, correct });
      [...optionsEl.children].forEach((btn, i) => {
        btn.disabled = true;
        if (i === item.a) btn.classList.add("correct");
        if (i === state.selected && !correct) btn.classList.add("wrong");
      });
      feedback.style.display = "block";
      feedback.innerHTML = `<strong>${correct ? "回答正确" : "回答错误"}</strong><br>正确答案：${String.fromCharCode(65 + item.a)}. ${item.o[item.a]}<br>解析：${item.e}`;
      confirmBtn.classList.add("hidden");
      if (state.index + 1 === QUESTION_COUNT) {
        finishBtn.classList.remove("hidden");
      } else {
        nextBtn.classList.remove("hidden");
      }
      progressFill.style.width = `${((state.index + 1) / QUESTION_COUNT) * 100}%`;
    }

    function nextQuestion() {
      state.index += 1;
      renderQuestion();
    }

    function showReport() {
      quiz.style.display = "none";
      report.style.display = "block";
      const total = state.answers.length;
      const correct = state.answers.filter(a => a.correct).length;
      const accuracy = Math.round((correct / total) * 100);
      const wrong = total - correct;
      document.getElementById("reportSummary").innerHTML = [
        ["测验难度", state.level],
        ["答对题数", `${correct}/${total}`],
        ["正确率", `${accuracy}%`],
        ["错题数", wrong]
      ].map(([label, value]) => `<div class="report-card"><span>${label}</span><strong>${value}</strong></div>`).join("");

      const grouped = {};
      state.answers.forEach(ans => {
        grouped[ans.item.c] ||= { total: 0, correct: 0 };
        grouped[ans.item.c].total += 1;
        if (ans.correct) grouped[ans.item.c].correct += 1;
      });
      document.getElementById("categoryBars").innerHTML = Object.entries(grouped)
        .sort((a, b) => a[0].localeCompare(b[0], "zh-CN"))
        .map(([cat, data]) => {
          const pct = Math.round((data.correct / data.total) * 100);
          return `<div class="bar-row"><span>${cat}</span><div class="bar"><span style="width:${pct}%"></span></div><strong>${pct}%</strong></div>`;
        }).join("");

      const advice = document.getElementById("advice");
      if (accuracy >= 90) {
        advice.textContent = "掌握情况优秀，制度条款、流程节点和关键数值均较稳定。建议继续用困难模式复盘审批边界、超额控制线和招投标例外情形。";
      } else if (accuracy >= 75) {
        advice.textContent = "整体掌握较好，但仍有少量易混点。建议重点复习错题对应模块，尤其是审批权限、招标时限、合同鉴证和竣工验收责任。";
      } else if (accuracy >= 60) {
        advice.textContent = "基础框架已有一定掌握，但流程和数值边界还不够稳。建议先回看普通和中等题，把审批额度、招标额度、时间节点、付款比例做成清单记忆。";
      } else {
        advice.textContent = "当前正确率偏低，建议先从普通模式重新学习。优先掌握项目立项资料、审批层级、公开/邀请/议标条件、合同鉴证和验收后评估的主线流程。";
      }

      const missed = state.answers.filter(ans => !ans.correct);
      const reviewList = document.getElementById("reviewList");
      if (!missed.length) {
        reviewList.innerHTML = `<div class="review-item"><strong>本次没有错题。</strong><br>可以切换更高难度继续测验。</div>`;
      } else {
        reviewList.innerHTML = missed.map((ans, idx) => `
          <div class="review-item">
            <strong>${idx + 1}. ${ans.item.q}</strong><br>
            你的答案：${String.fromCharCode(65 + ans.selected)}. ${ans.item.o[ans.selected]}<br>
            正确答案：${String.fromCharCode(65 + ans.item.a)}. ${ans.item.o[ans.item.a]}<br>
            解析：${ans.item.e}
          </div>
        `).join("");
      }
    }

    document.getElementById("difficultyChoices").addEventListener("click", (event) => {
      const btn = event.target.closest(".difficulty");
      if (!btn) return;
      state.level = btn.dataset.level;
      document.querySelectorAll(".difficulty").forEach(item => item.classList.toggle("active", item === btn));
    });

    document.getElementById("startBtn").addEventListener("click", startQuiz);
    document.getElementById("shuffleBtn").addEventListener("click", () => makeSet());
    confirmBtn.addEventListener("click", confirmAnswer);
    nextBtn.addEventListener("click", nextQuestion);
    finishBtn.addEventListener("click", showReport);
    document.getElementById("restartBtn").addEventListener("click", () => {
      report.style.display = "none";
      setup.style.display = "grid";
    });
    document.getElementById("newSetBtn").addEventListener("click", startQuiz);
  </script>
</body>
</html>
